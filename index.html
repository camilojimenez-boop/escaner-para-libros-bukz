<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Escáner ISBN & Códigos de Barras</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #00e676;
    --accent2: #69f0ae;
    --text: #f0f0f0;
    --muted: #888;
    --danger: #ff5252;
    --warn: #ffeb3b;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
  body { display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 0; }

  header {
    width: 100%; max-width: 480px;
    padding: 1.25rem 1.25rem 0.75rem;
    display: flex; align-items: center; gap: 10px;
  }
  .logo { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo svg { width: 18px; height: 18px; fill: #000; }
  header h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; color: var(--text); }
  header small { font-size: 11px; color: var(--muted); display: block; margin-top: 1px; }

  main { width: 100%; max-width: 480px; padding: 0.75rem 1.25rem 2rem; flex: 1; }

  /* Camera */
  #cam-wrap {
    width: 100%; aspect-ratio: 4/3; border-radius: var(--radius);
    background: #111; overflow: hidden; position: relative;
    border: 1px solid var(--border); margin-bottom: 0.75rem; display: none;
  }
  #cam-wrap.active { display: block; }
  #video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .scan-corners { position: absolute; inset: 0; pointer-events: none; }
  .scan-corners::before, .scan-corners::after,
  .c2::before, .c2::after {
    content: ''; position: absolute;
    width: 22px; height: 22px;
    border-color: var(--accent); border-style: solid;
  }
  .scan-corners::before { top: 14px; left: 14px; border-width: 3px 0 0 3px; border-radius: 3px 0 0 0; }
  .scan-corners::after  { top: 14px; right: 14px; border-width: 3px 3px 0 0; border-radius: 0 3px 0 0; }
  .c2::before { bottom: 14px; left: 14px; border-width: 0 0 3px 3px; border-radius: 0 0 0 3px; }
  .c2::after  { bottom: 14px; right: 14px; border-width: 0 3px 3px 0; border-radius: 0 0 3px 0; }
  #scan-line {
    position: absolute; left: 12%; right: 12%; height: 2px;
    background: var(--accent); top: 20%;
    box-shadow: 0 0 8px var(--accent);
    animation: sweep 2s ease-in-out infinite;
  }
  @keyframes sweep { 0%,100% { top: 15%; } 50% { top: 82%; } }

  /* Buttons */
  .btn {
    width: 100%; padding: 13px 16px; border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border);
    background: var(--surface); color: var(--text);
    transition: background 0.15s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn:active { transform: scale(0.97); }
  .btn.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
  .btn.primary:active { background: var(--accent2); }
  .btn.danger { background: transparent; color: var(--danger); border-color: var(--danger); }
  .btn.stop { background: #1e1e1e; color: var(--danger); border-color: #3a1a1a; }
  #cam-btn { margin-bottom: 0.75rem; }

  /* Status */
  #status {
    padding: 10px 14px; border-radius: var(--radius-sm);
    font-size: 13px; display: flex; align-items: center; gap: 10px;
    background: var(--surface); border: 1px solid var(--border);
    margin-bottom: 0.75rem; min-height: 42px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .dot.on { background: var(--accent); animation: blink 1.2s ease-in-out infinite; }
  .dot.ok { background: var(--accent); animation: none; }
  .dot.err { background: var(--danger); animation: none; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Manual input */
  .input-row { display: flex; gap: 8px; margin-bottom: 0.75rem; }
  input[type=text] {
    flex: 1; padding: 11px 14px; border-radius: var(--radius-sm);
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px;
    outline: none;
  }
  input[type=text]:focus { border-color: var(--accent); }
  input[type=text]::placeholder { color: var(--muted); }
  .add-btn {
    padding: 11px 16px; border-radius: var(--radius-sm);
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-size: 13px; font-weight: 500;
    cursor: pointer; white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
  }
  .add-btn:active { transform: scale(0.97); }

  /* List */
  .list-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.5rem;
  }
  .list-header span { font-size: 13px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .badge {
    font-size: 11px; font-family: 'DM Mono', monospace;
    padding: 2px 10px; border-radius: 99px;
    background: var(--surface2); color: var(--muted);
    border: 1px solid var(--border);
  }
  .clear-lnk { font-size: 12px; color: var(--danger); background: none; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; }

  #list {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    max-height: 280px; overflow-y: auto;
    margin-bottom: 0.75rem;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  #empty { padding: 2.5rem 1rem; text-align: center; color: var(--muted); font-size: 13px; }
  .row {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 14px; border-bottom: 1px solid var(--border);
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
  .row:last-child { border-bottom: none; }
  .num { width: 22px; height: 22px; border-radius: 50%; background: var(--surface2); color: var(--muted); font-size: 11px; font-weight: 500; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .code { flex: 1; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text); word-break: break-all; }
  .tag {
    font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 99px;
    flex-shrink: 0; letter-spacing: 0.3px;
  }
  .tag-isbn { background: #0d2a4a; color: #64b5f6; }
  .tag-qr   { background: #1a0d3a; color: #ce93d8; }
  .tag-bar  { background: #0d2a1a; color: #81c784; }
  .del { background: none; border: none; color: var(--muted); font-size: 15px; cursor: pointer; padding: 2px 4px; flex-shrink: 0; }
  .del:hover { color: var(--danger); }

  /* Export */
  .export-row { display: flex; gap: 8px; }
  .export-row .btn { flex: 1; }

  /* Flash */
  #flash { position: fixed; inset: 0; background: rgba(0,230,118,0.15); pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 99; }
  #flash.show { opacity: 1; transition: none; }

  @media (min-width: 500px) {
    main, header { padding-left: 2rem; padding-right: 2rem; }
  }
</style>
</head>
<body>
<div id="flash"></div>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="3" width="2" height="18"/><rect x="7" y="3" width="1" height="18"/>
      <rect x="10" y="3" width="3" height="18"/><rect x="15" y="3" width="1" height="18"/>
      <rect x="18" y="3" width="3" height="18"/>
    </svg>
  </div>
  <div>
    <h1>Escáner de Códigos</h1>
    <small>ISBN · Código de barras · QR → Excel</small>
  </div>
</header>

<main>
  <button class="btn" id="cam-btn" onclick="toggleCam()">📷 Activar cámara</button>

  <div id="cam-wrap">
    <video id="video" autoplay playsinline muted></video>
    <div class="scan-corners"><div class="c2"></div></div>
    <div id="scan-line"></div>
  </div>

  <div id="status"><div class="dot" id="dot"></div><span id="stxt">Listo — activa la cámara o ingresa manualmente</span></div>

  <div class="input-row">
    <input type="text" id="manual" placeholder="ISBN, código de barras..." inputmode="numeric" />
    <button class="add-btn" onclick="addManual()">+ Agregar</button>
  </div>

  <div class="list-header">
    <span>Escaneados <span class="badge" id="cnt">0</span></span>
    <button class="clear-lnk" onclick="clearAll()">Limpiar todo</button>
  </div>

  <div id="list"><div id="empty">Sin escaneos aún</div></div>

  <div class="export-row">
    <button class="btn primary" onclick="exportCSV()">⬇ Descargar CSV</button>
    <button class="btn" onclick="copyTSV()">⧉ Copiar tabla</button>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/zxing-js@0.19.1/library/umd/zxing-js.min.js"></script>
<script>
let items = [], camOn = false, stream = null, scanning = false;

function setStatus(msg, type) {
  document.getElementById('stxt').textContent = msg;
  const d = document.getElementById('dot');
  d.className = 'dot' + (type === 'on' ? ' on' : type === 'ok' ? ' ok' : type === 'err' ? ' err' : '');
}

function detectType(c) {
  const n = c.replace(/\D/g,'');
  if ((n.length===13 && (n.startsWith('978')||n.startsWith('979')))||n.length===10) return 'ISBN';
  if (c.startsWith('http')||c.startsWith('https')||(c.length>25&&/[a-zA-Z]/.test(c))) return 'QR';
  return 'BAR';
}

function addCode(code) {
  code = code.trim();
  if (!code) return;
  if (items.find(i=>i.code===code)) { setStatus('Ya registrado: '+code.slice(0,22), 'err'); return; }
  const type = detectType(code);
  const ts = new Date().toLocaleString('es-MX');
  items.push({ code, type, ts, id: Date.now() });
  render();
  setStatus('✓ '+code.slice(0,30), 'ok');
  document.getElementById('manual').value = '';
  flash();
}

function flash() {
  const f = document.getElementById('flash');
  f.classList.add('show');
  setTimeout(()=>f.classList.remove('show'), 150);
}

function removeItem(id) { items = items.filter(i=>i.id!==id); render(); }
function clearAll() { if(items.length&&confirm('¿Limpiar todos los códigos?')) { items=[]; render(); setStatus('Lista limpiada',''); } }

function render() {
  document.getElementById('cnt').textContent = items.length;
  const list = document.getElementById('list');
  if (!items.length) { list.innerHTML='<div id="empty">Sin escaneos aún</div>'; return; }
  list.innerHTML = items.map((item,i)=>`
    <div class="row">
      <div class="num">${i+1}</div>
      <div class="code">${escHtml(item.code)}</div>
      <span class="tag ${item.type==='ISBN'?'tag-isbn':item.type==='QR'?'tag-qr':'tag-bar'}">${item.type}</span>
      <button class="del" onclick="removeItem(${item.id})">✕</button>
    </div>`).join('');
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function exportCSV() {
  if (!items.length) { alert('No hay códigos para exportar'); return; }
  const rows = [['N°','Código','Tipo','Fecha/Hora'],...items.map((it,i)=>[i+1,it.code,it.type,it.ts])];
  const csv = rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='codigos_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click(); URL.revokeObjectURL(url);
  setStatus('CSV descargado ✓','ok');
}

function copyTSV() {
  if (!items.length) { alert('No hay códigos para copiar'); return; }
  const rows = [['N°','Código','Tipo','Fecha/Hora'],...items.map((it,i)=>[i+1,it.code,it.type,it.ts])];
  navigator.clipboard.writeText(rows.map(r=>r.join('\t')).join('\n'))
    .then(()=>setStatus('Copiado — pega en Excel/Sheets con Ctrl+V','ok'))
    .catch(()=>setStatus('Error al copiar','err'));
}

async function toggleCam() {
  const btn = document.getElementById('cam-btn');
  const wrap = document.getElementById('cam-wrap');
  if (camOn) {
    stopCam();
    btn.innerHTML='📷 Activar cámara';
    btn.className='btn';
    wrap.classList.remove('active');
    setStatus('Cámara detenida','');
    return;
  }
  try {
    stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}},audio:false});
    const v = document.getElementById('video');
    v.srcObject = stream;
    wrap.classList.add('active');
    btn.innerHTML='⏹ Detener cámara';
    btn.className='btn stop';
    camOn = true;
    setStatus('Cámara activa — apunta al código','on');
    startScan(v);
  } catch(e) {
    setStatus('Sin acceso a cámara — usa entrada manual','err');
  }
}

function stopCam() {
  camOn = false; scanning = false;
  if (stream) { stream.getTracks().forEach(t=>t.stop()); stream=null; }
}

function startScan(video) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  let last='', lastT=0;
  scanning = true;

  function tick() {
    if (!camOn || !scanning) return;
    if (video.readyState===4) {
      canvas.width=video.videoWidth; canvas.height=video.videoHeight;
      ctx.drawImage(video,0,0);
      try {
        if (window.ZXing) {
          const img = ctx.getImageData(0,0,canvas.width,canvas.height);
          const lum = new ZXing.RGBLuminanceSource(img.data,canvas.width,canvas.height);
          const bmp = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(lum));
          const hints = new Map();
          hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS,[
            ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.EAN_8,
            ZXing.BarcodeFormat.CODE_128, ZXing.BarcodeFormat.CODE_39,
            ZXing.BarcodeFormat.UPC_A, ZXing.BarcodeFormat.QR_CODE,
            ZXing.BarcodeFormat.DATA_MATRIX
          ]);
          const reader = new ZXing.MultiFormatReader();
          reader.setHints(hints);
          const res = reader.decode(bmp);
          if (res) {
            const code = res.getText();
            const now = Date.now();
            if (code!==last || now-lastT>3000) {
              last=code; lastT=now;
              addCode(code);
            }
          }
        }
      } catch(e){}
    }
    requestAnimationFrame(tick);
  }
  tick();
}

document.getElementById('manual').addEventListener('keydown', e=>{ if(e.key==='Enter') addManual(); });
function addManual() { addCode(document.getElementById('manual').value); }
</script>
</body>
</html>
