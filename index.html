<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Escáner ISBN</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424;
    --border: #2e2e2e; --accent: #00e676; --accent2: #69f0ae;
    --text: #f0f0f0; --muted: #888; --danger: #ff5252;
    --radius: 12px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

  header { padding: 1.25rem 1.25rem 0.75rem; display: flex; align-items: center; gap: 10px; }
  .logo { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo svg { width: 18px; height: 18px; fill: #000; }
  header h1 { font-size: 16px; font-weight: 600; color: var(--text); }
  header small { font-size: 11px; color: var(--muted); display: block; margin-top: 1px; }

  main { padding: 0 1.25rem 2rem; }

  #viewport {
    width: 100%; aspect-ratio: 4/3; border-radius: var(--radius);
    background: #111; overflow: hidden; position: relative;
    border: 1px solid var(--border); margin-bottom: 0.75rem; display: none;
  }
  #viewport.active { display: block; }
  #viewport video { width: 100% !important; height: 100% !important; object-fit: cover !important; display: block !important; position: absolute !important; top:0 !important; left:0 !important; }
  #viewport canvas { display: none !important; }

  .scan-corners { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
  .scan-corners::before, .scan-corners::after, .c2::before, .c2::after {
    content: ''; position: absolute; width: 22px; height: 22px;
    border-color: var(--accent); border-style: solid;
  }
  .scan-corners::before { top: 14px; left: 14px; border-width: 3px 0 0 3px; border-radius: 3px 0 0 0; }
  .scan-corners::after  { top: 14px; right: 14px; border-width: 3px 3px 0 0; border-radius: 0 3px 0 0; }
  .c2::before { bottom: 14px; left: 14px; border-width: 0 0 3px 3px; border-radius: 0 0 0 3px; }
  .c2::after  { bottom: 14px; right: 14px; border-width: 0 3px 3px 0; border-radius: 0 0 3px 0; }
  #scan-line {
    position: absolute; left: 12%; right: 12%; height: 2px; z-index: 11;
    background: var(--accent); top: 20%; box-shadow: 0 0 8px var(--accent);
    animation: sweep 2s ease-in-out infinite;
  }
  @keyframes sweep { 0%,100% { top: 15%; } 50% { top: 82%; } }

  .btn {
    width: 100%; padding: 13px 16px; border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border);
    background: var(--surface); color: var(--text);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn:active { transform: scale(0.97); }
  .btn.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
  .btn.stop { background: #1e1e1e; color: var(--danger); border-color: #3a1a1a; }
  #cam-btn { margin-bottom: 0.75rem; }

  #status {
    padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px;
    display: flex; align-items: center; gap: 10px;
    background: var(--surface); border: 1px solid var(--border);
    margin-bottom: 0.75rem; min-height: 42px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .dot.on  { background: var(--accent); animation: blink 1.2s ease-in-out infinite; }
  .dot.ok  { background: var(--accent); }
  .dot.err { background: var(--danger); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .input-row { display: flex; gap: 8px; margin-bottom: 0.75rem; }
  input[type=text] {
    flex: 1; padding: 11px 14px; border-radius: var(--radius-sm);
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; outline: none;
  }
  input[type=text]:focus { border-color: var(--accent); }
  input[type=text]::placeholder { color: var(--muted); }
  .add-btn {
    padding: 11px 16px; border-radius: var(--radius-sm);
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-size: 13px; font-weight: 500;
    cursor: pointer; font-family: 'DM Sans', sans-serif; white-space: nowrap;
  }
  .add-btn:active { transform: scale(0.97); }

  .list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; }
  .list-header span { font-size: 13px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .badge { font-size: 11px; font-family: 'DM Mono', monospace; padding: 2px 10px; border-radius: 99px; background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .clear-lnk { font-size: 12px; color: var(--danger); background: none; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; }

  /* Saved indicator */
  #saved-info {
    font-size: 11px; color: var(--muted); text-align: center;
    margin-bottom: 0.5rem; display: none;
  }
  #saved-info.visible { display: block; }

  #list {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    max-height: 260px; overflow-y: auto;
    margin-bottom: 0.75rem;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  #empty { padding: 2.5rem 1rem; text-align: center; color: var(--muted); font-size: 13px; }
  .row {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 14px; border-bottom: 1px solid var(--border);
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
  .row:last-child { border-bottom: none; }
  .num { width: 22px; height: 22px; border-radius: 50%; background: var(--surface2); color: var(--muted); font-size: 11px; font-weight: 500; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .code { flex: 1; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text); word-break: break-all; }
  .del { background: none; border: none; color: var(--muted); font-size: 15px; cursor: pointer; padding: 2px 4px; flex-shrink: 0; }

  .export-row { display: flex; gap: 8px; }
  .export-row .btn { flex: 1; }

  #flash { position: fixed; inset: 0; background: rgba(0,230,118,0.15); pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 99; }
  #flash.show { opacity: 1; transition: none; }
</style>
</head>
<body>
<div id="flash"></div>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="2" height="18"/><rect x="7" y="3" width="1" height="18"/><rect x="10" y="3" width="3" height="18"/><rect x="15" y="3" width="1" height="18"/><rect x="18" y="3" width="3" height="18"/></svg>
  </div>
  <div>
    <h1>Escáner ISBN</h1>
    <small>Inventario de libros → Excel</small>
  </div>
</header>

<main>
  <button class="btn" id="cam-btn" onclick="toggleCam()">📷 Activar cámara</button>

  <div id="viewport">
    <div class="scan-corners"><div class="c2"></div></div>
    <div id="scan-line"></div>
  </div>

  <div id="status"><div class="dot" id="dot"></div><span id="stxt">Cargando datos guardados...</span></div>

  <div class="input-row">
    <input type="text" id="manual" placeholder="ISBN manual..." inputmode="numeric" />
    <button class="add-btn" onclick="addManual()">+ Agregar</button>
  </div>

  <div class="list-header">
    <span>Escaneados <span class="badge" id="cnt">0</span></span>
    <button class="clear-lnk" onclick="clearAll()">Limpiar todo</button>
  </div>

  <div id="saved-info" id="saved-info">💾 Datos guardados en este dispositivo</div>

  <div id="list"><div id="empty">Sin escaneos aún</div></div>

  <div class="export-row">
    <button class="btn primary" onclick="exportCSV()">⬇ Descargar CSV</button>
    <button class="btn" onclick="copyCodes()">⧉ Copiar ISBN</button>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
<script>
const STORAGE_KEY = 'bukz_isbn_items';
let items = [], camOn = false, scanLocked = false;

// --- Persistencia ---
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); } catch(e){}
}

function load() {
  try {
    const d = localStorage.getItem(STORAGE_KEY);
    if (d) items = JSON.parse(d);
  } catch(e) { items = []; }
}

// --- Init: cargar datos al abrir ---
load();
render();
if (items.length > 0) {
  setStatus('Se cargaron ' + items.length + ' ISBN guardados', 'ok');
  document.getElementById('saved-info').classList.add('visible');
} else {
  setStatus('Listo — activa la cámara o ingresa manualmente', '');
}

// --- Helpers ---
function setStatus(msg, type) {
  document.getElementById('stxt').textContent = msg;
  const d = document.getElementById('dot');
  d.className = 'dot' + (type==='on' ? ' on' : type==='ok' ? ' ok' : type==='err' ? ' err' : '');
}

function addCode(code) {
  code = code.trim();
  if (!code) return;
  const ts = new Date().toLocaleString('es-MX');
  items.push({ code, ts, id: Date.now() });
  save();
  render();
  setStatus('✓ ISBN guardado: ' + code, 'ok');
  document.getElementById('manual').value = '';
  document.getElementById('saved-info').classList.add('visible');
  const f = document.getElementById('flash');
  f.classList.add('show');
  setTimeout(()=>f.classList.remove('show'), 200);
}

function removeItem(id) {
  items = items.filter(i=>i.id!==id);
  save();
  render();
}

function clearAll() {
  if (items.length && confirm('¿Limpiar todos los ISBN? Esta acción no se puede deshacer.')) {
    items = [];
    save();
    render();
    setStatus('Lista limpiada', '');
    document.getElementById('saved-info').classList.remove('visible');
  }
}

function render() {
  document.getElementById('cnt').textContent = items.length;
  const list = document.getElementById('list');
  if (!items.length) { list.innerHTML='<div id="empty">Sin escaneos aún</div>'; return; }
  list.innerHTML = items.map((item,i)=>`
    <div class="row">
      <div class="num">${i+1}</div>
      <div class="code">${item.code.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>
      <button class="del" onclick="removeItem(${item.id})">✕</button>
    </div>`).join('');
  // Scroll al último
  list.scrollTop = list.scrollHeight;
}

function exportCSV() {
  if (!items.length) { alert('No hay ISBN para exportar'); return; }
  const csv = items.map(it=>`"${it.code}"`).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='isbn_inventario_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click(); URL.revokeObjectURL(url);
  setStatus('CSV descargado ✓', 'ok');
}

function copyCodes() {
  if (!items.length) { alert('No hay ISBN para copiar'); return; }
  const text = items.map(it=>it.code).join('\n');
  navigator.clipboard.writeText(text)
    .then(()=>setStatus('Copiado — pega en Excel o WhatsApp', 'ok'))
    .catch(()=>setStatus('Error al copiar', 'err'));
}

// --- Quagga scanner ---
function startQuagga() {
  Quagga.init({
    inputStream: {
      name: 'Live',
      type: 'LiveStream',
      target: document.getElementById('viewport'),
      constraints: {
        facingMode: 'environment',
        width: { min: 640, ideal: 1280, max: 1920 },
        height: { min: 480, ideal: 720, max: 1080 }
      },
      area: { top: '15%', right: '5%', left: '5%', bottom: '15%' }
    },
    decoder: {
      readers: ['ean_reader'],
      multiple: false
    },
    locate: true,
    numOfWorkers: 2,
    frequency: 15
  }, function(err) {
    if (err) { setStatus('Error al iniciar cámara', 'err'); stopCam(); return; }
    Quagga.start();
    setStatus('Cámara activa — apunta al ISBN del libro', 'on');
  });

  Quagga.onDetected(function(result) {
    if (!result || !result.codeResult) return;
    const code = result.codeResult.code;
    if (!code || code.length < 10) return;

    // Solo ISBN (978/979 o 10 dígitos)
    const n = code.replace(/\D/g,'');
    const isISBN = (n.length===13 && (n.startsWith('978')||n.startsWith('979'))) || n.length===10;
    if (!isISBN) return;

    // Filtrar por confianza
    const errors = result.codeResult.decodedCodes.filter(x=>x.error!==undefined).map(x=>x.error);
    if (errors.length > 0) {
      const avg = errors.reduce((a,b)=>a+b,0) / errors.length;
      if (avg > 0.3) return;
    }

    if (scanLocked) return;
    scanLocked = true;
    addCode(code);

    let secs = 3;
    setStatus('⏳ Siguiente escaneo en ' + secs + 's...', 'on');
    const iv = setInterval(()=>{
      secs--;
      if (secs > 0) {
        setStatus('⏳ Siguiente escaneo en ' + secs + 's...', 'on');
      } else {
        clearInterval(iv);
        scanLocked = false;
        setStatus('Listo — apunta al siguiente ISBN', 'on');
      }
    }, 1000);
  });
}

function stopCam() {
  camOn = false;
  try { Quagga.stop(); } catch(e){}
  const vp = document.getElementById('viewport');
  vp.classList.remove('active');
  vp.innerHTML = '<div class="scan-corners"><div class="c2"></div></div><div id="scan-line"></div>';
  document.getElementById('cam-btn').innerHTML = '📷 Activar cámara';
  document.getElementById('cam-btn').className = 'btn';
}

async function toggleCam() {
  if (camOn) { stopCam(); setStatus('Cámara detenida',''); return; }
  try {
    const test = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    test.getTracks().forEach(t=>t.stop());
  } catch(e) {
    setStatus('Sin acceso a cámara — permite el permiso en tu navegador', 'err');
    return;
  }
  document.getElementById('viewport').classList.add('active');
  document.getElementById('cam-btn').innerHTML = '⏹ Detener cámara';
  document.getElementById('cam-btn').className = 'btn stop';
  camOn = true;
  setStatus('Iniciando cámara...', '');
  startQuagga();
}

document.getElementById('manual').addEventListener('keydown', e=>{ if(e.key==='Enter') addManual(); });
function addManual() { addCode(document.getElementById('manual').value); }
</script>
</body>
</html>
